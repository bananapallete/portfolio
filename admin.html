<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>관리자 페이지 — Unlimit_Cho Portfolio</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="admin-shell">
  <header class="admin-header">
    <div class="container">
      <h1>✎ 관리자 페이지 — 콘텐츠 수정</h1>
      <div class="admin-actions">
        <button class="btn btn-outline file-btn btn-small" style="color:#fff;border-color:rgba(250,249,246,0.3)">
          불러오기(json)
          <input type="file" id="importFile" accept="application/json" />
        </button>
        <button class="btn btn-ghost btn-small" id="resetBtn">원본 다시 불러오기</button>
        <button class="btn btn-ghost btn-small" id="previewBtn">미리보기</button>
        <button class="btn btn-ghost btn-small" id="tokenBtn">GitHub 토큰 설정</button>
        <button class="btn btn-outline btn-small" id="exportBtn" style="color:#fff;border-color:rgba(250,249,246,0.3)">내보내기(백업)</button>
        <button class="btn btn-primary btn-small" id="publishBtn">🚀 사이트에 반영</button>
      </div>
    </div>
    <div class="container" style="margin-top:8px;">
      <span class="autosave-status" id="autosaveStatus">불러오는 중...</span>
    </div>
  </header>

  <div class="container">
    <div class="admin-notice">
      ✨ 수정한 내용은 브라우저에 자동 임시저장되고, 상단 <strong>🚀 사이트에 반영</strong> 버튼을 누르면
      GitHub에 자동으로 커밋되어 <strong>1~2분 안에 실제 사이트에 반영</strong>돼요.<br/>
      처음 한 번만 GitHub 토큰을 입력하면 이 브라우저에 저장됩니다(토큰이 없는 사람은 배포할 수 없어요).
      <strong>내보내기(백업)</strong>는 data.json을 파일로 받아두는 백업용이에요.
    </div>

    <section class="admin-section" id="profileSection">
      <h2><span class="dot" style="background:#ffc93c"></span>프로필 &amp; 연락처</h2>
      <div id="profileFields"></div>
    </section>

    <section class="admin-section" id="categoriesSection">
      <h2><span class="dot" style="background:#6c5ce7"></span>카테고리 &amp; 프로젝트</h2>
      <div id="categoriesContainer"></div>
      <button class="btn btn-outline btn-small" id="addCategoryBtn" style="margin-top:16px;">+ 카테고리 추가</button>
    </section>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
