<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unlimit_Cho — Portfolio</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="brand">
      <span class="brand-name" id="brandName">Unlimit_Cho</span>
      <span class="brand-role" id="brandRole">Designer</span>
    </div>
    <nav class="tabs" id="tabs"></nav>
  </div>
</header>

<section class="hero" id="hero">
  <div class="hero-media" id="heroMedia" hidden>
    <video id="heroVideo" autoplay muted loop playsinline></video>
    <div class="hero-dim" id="heroDim"></div>
  </div>
  <div class="container">
    <span class="hero-kicker">✦ Portfolio</span>
    <h1 class="hero-title" id="heroTitle">Hi, I'm <span id="heroName">Unlimit_Cho</span></h1>
    <p class="hero-tagline" id="heroTagline">브랜딩 · 일러스트 · 모션그래픽을 넘나드는 크리에이티브</p>
  </div>
</section>

<section class="work">
  <div class="container">
    <div class="work-grid" id="workGrid">
      <div class="empty-state">불러오는 중...</div>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container footer-grid">
    <div>
      <div class="footer-title" id="footerName">Unlimit_Cho</div>
      <div class="footer-contact" id="footerContact"></div>
    </div>
    <a class="footer-admin-link" href="admin.html">관리자용 편집 페이지 →</a>
  </div>
</footer>

<script src="blocks.js"></script>
<script src="script.js"></script>
</body>
</html>
